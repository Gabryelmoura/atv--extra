<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cadastro.css">
    <script src="./js/sessao.js"></script>


    <title>PharmaVeris | Cadastro</title>
</head>

<body onload="listar()">
  <div class="header">
    <div class="logo">
      <img class="img-logo" src="assets/icon/logo.png" style="height: 90px; width: 300px;" alt="Imagem da Logo da Safe Control">
    </div>
      <button class="voltar"> <a style="color: white;" href="./Site.html">Voltar</a> </button>
  </div>

  <div class="fala">
    <h1>Crie sua conta <br>
    e eleve o padrão da <br>
    <p>sua produção</p>
    </h1>
  </div>
  <div class="main">
    <div class="formulario">
      <div class="form">
        <div class="alerta_erro">
          <div class="card_erro" id="cardErro">
            <span id="mensagem_erro"></span>
          </div>
        </div>
        <h2>Cadastro</h2>
        <div style="color: red;" id="msg_Erro"></div>

        <div class="form-inputs">
          <h3>Código de ativação:</h3>
          <input type="text" id="codigo_input" placeholder="Insira aqui seu código">
        </div>

        <div class="form-inputs">
          <h3>Nome:</h3>
          <input type="text" id="nome_input" placeholder="Seu nome">
        </div>

        <div class="form-inputs">
          <h3>CPF:</h3>
          <input type="text" id="cpf_input" placeholder="00000000000">
        </div>
          
        <div class="form-inputs">
            <h3>Telefone: </h3>
            <input type="text" id="telefone_input" placeholder="000000000">
        </div>

        <div class="form-inputs">
            <h3>Email: </h3>
            <input type="text" id="email_input" placeholder="email@provedor.com">
        </div>

        <div class="form-inputs">
          <h3>Senha: </h3>
          <input type="password" id="senha_input" placeholder="********">
        </div>

        <div class="form-inputs">
          <h3>Confirme a senha: </h3>
          <input type="password" id="confirmacao_senha_input" placeholder="********">
        </div>

        <p>Já possui uma conta? Faça o login: <a class="link-entrar" href="./login.html">Clique aqui!</a></p>
        <button class="entrar" onclick="cadastrar()"><a class="texto-botao">Cadastrar</a></button>
        
        <div id="div_aguardar" class="loading-div">
         <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>
         
        <div id="div_erros_login"></div>
            
      </div>
    </div>
  </div>
</body>

</html>
<script>
 // Array para armazenar empresas cadastradas para validação de código de ativação 
  let listaEmpresasCadastradas = [];

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var telefoneVar = telefone_input.value;
    var cpfVar = cpf_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var codigoVar = codigo_input.value;
    var idEmpresaVincular;

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      telefoneVar == "" ||
      cpfVar == "" ||
      codigoVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    //Verificando se o código de ativação é de alguma empresa cadastrada
    console.log(`Quantidade de empresas no vetor ${listaEmpresasCadastradas.length}`)
    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].idEmpresa
        console.log("Código de ativação válido.");
        break;
      } else {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Mensagem de erro para código inválido)";
        finalizarAguardar();
      }
    }
    console.log({
    nomeVar, emailVar, senhaVar, telefoneVar, cpfVar, idEmpresaVincular
});
    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        cpfServer: cpfVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        telefoneServer: telefoneVar,
        idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  //Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
