<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/logo/Simbolo_SafeControl.png" type="image/x-icon">

    <title>PharmaVeris | Login</title>

    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/login.css">
    <link rel="icon" href="./assets/icon/favicon2.ico">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>
    <div class="header">
        <div class="logo">
      <img class="img-logo" src="assets/icon/logo.png" style="height: 90px; width: 300px;" alt="Imagem da Logo da Safe Control">
        </div>
        
        <button class="voltar"><a class="link-voltar" href="index.html">Voltar</a></button>
    </div>
     <div class="fala">
    <h1>Bem-vindo de volta!<br>
    acesse sua conta<br>
    <p>para continuar</p>
    </h1>
  </div>

    <div class="login">
        <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>

        <div class="container">
            <div class="card card-login">
                <div class="formulario">
                    <h2>Login</h2>
                    
                    <div class="campo">
                        <h3>E-mail:</h3>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>

                    <div class="campo">
                        <h3>Senha:</h3>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>

                    <p>Não tem uma conta? Inscreva-se agora: <a class="link-entrar" href="./cadastro.html">Clique aqui!</a></p>
                    
                    <button class="botao" onclick="entrar()"><span class="texto-botao">Entrar</span></button>
                </div>

                <div id="div_aguardar" class="loading-div">
                    <img src="./assets/circle-loading.gif" id="loading-gif">
                </div>

                <div id="div_erros_login"></div>
            </div>
        </div>
    </div>
</body>
</html>

<script>
    function entrar() {
        aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    //sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)
                    
                    if(emailVar == 'suporte@safe.com' && senhaVar == 'suporten3'){
                        setTimeout(function () {
                        window.location = "manul_instalação.html";
                    }, 1000);
                    }

                    else{
                        setTimeout(function () {
                            window.location = "pagina";
                        }, 1000);
                    }
                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
